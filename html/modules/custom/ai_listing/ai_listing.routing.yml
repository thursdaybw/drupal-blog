ai_listing.add:
  path: '/admin/ai-listing/add'
  defaults:
    _form: '\Drupal\ai_listing\Form\AiBookListingUploadForm'
    _title: 'Add AI Book Listing'
  requirements:
    _permission: 'administer ai listings'

ai_listing.bundle_add:
  path: '/admin/ai-listing/add-bundle'
  defaults:
    _form: '\Drupal\ai_listing\Form\AiBookBundleListingUploadForm'
    _title: 'Add AI Book Bundle Listing'
  requirements:
    _permission: 'administer ai listings'

ai_listing.workbench:
  path: '/admin/ai-listings/workbench'
  defaults:
    _form: '\Drupal\ai_listing\Form\AiListingWorkbenchForm'
    _title: 'Listing workbench'
  requirements:
    _permission: 'administer ai listings'

ai_listing.workbench.publish_update_confirm:
  path: '/admin/ai-listings/workbench/publish-update/confirm'
  defaults:
    _form: '\Drupal\ai_listing\Form\AiBookListingPublishUpdateConfirmForm'
    _title: 'Confirm publish/update without location'
  requirements:
    _permission: 'administer ai listings'

ai_listing.workbench.location_confirm:
  path: '/admin/ai-listings/workbench/location/confirm'
  defaults:
    _form: '\Drupal\ai_listing\Form\AiListingLocationUpdateConfirmForm'
    _title: 'Confirm location update'
  requirements:
    _permission: 'administer ai listings'

entity.bb_ai_listing.canonical:
  path: '/admin/ai-listings/{bb_ai_listing}'
  defaults:
    _controller: '\Drupal\ai_listing\Controller\AiListingReviewController::build'
    _title_callback: '\Drupal\ai_listing\Controller\AiListingReviewController::getTitle'
  requirements:
    _permission: 'administer ai listings'
  options:
    parameters:
      bb_ai_listing:
        type: entity:bb_ai_listing
