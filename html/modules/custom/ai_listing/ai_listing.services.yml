services:
  ai_listing.image_normalization:
    class: Drupal\ai_listing\Service\ImageNormalizationService
    arguments:
      - '@file_system'
      - '@logger.factory'

  ai_listing.inventory_sku_resolver:
    class: Drupal\ai_listing\Service\AiListingInventorySkuResolver
    arguments:
      - '@entity_type.manager'

  ai_listing.bundle_ebay_title_builder:
    class: Drupal\ai_listing\Service\BundleEbayTitleBuilder

  ai_listing.batch_dataset_provider:
    class: Drupal\ai_listing\Service\AiListingBatchDatasetProvider
    arguments:
      - '@entity_type.manager'

  ai_listing.batch_selection_manager:
    class: Drupal\ai_listing\Service\AiListingBatchSelectionManager

  ai_listing.bundle_ebay_title_refresh:
    class: Drupal\ai_listing\Service\BundleEbayTitleRefreshService
    arguments:
      - '@entity_type.manager'
      - '@ai_listing.bundle_ebay_title_builder'

  ai_listing.ebay_stock_cull_report_query:
    class: Drupal\ai_listing\Report\EbayStockCullReportQuery
    arguments:
      - '@database'

  ai_listing.stock_cull_selection_store:
    class: Drupal\ai_listing\Service\StockCullSelectionStore
    arguments:
      - '@keyvalue'

  ai_listing.listing_history_recorder:
    class: Drupal\ai_listing\Service\ListingHistoryRecorder
    arguments:
      - '@database'
      - '@datetime.time'
      - '@current_user'

  ai_listing.listing_history_query:
    class: Drupal\ai_listing\Service\ListingHistoryQuery
    arguments:
      - '@database'

  ai_listing.listing_cull_service:
    class: Drupal\ai_listing\Service\ListingCullService
    arguments:
      - '@entity_type.manager'
      - !tagged_iterator listing_publishing.marketplace_unpublisher
      - '@ai_listing.listing_history_recorder'
