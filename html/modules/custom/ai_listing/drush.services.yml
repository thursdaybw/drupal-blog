services:
  ai_listing.fake_command:
    class: Drupal\ai_listing\Command\AiListingFakeCommand
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: drush.command }

  ai_listing.publish_command:
    class: Drupal\ai_listing\Command\AiListingPublishCommand
    arguments:
      - '@entity_type.manager'
      - '@drupal.listing_publishing.publisher'
    tags:
      - { name: drush.command }

  ai_listing.bundle_ebay_title_refresh_command:
    class: Drupal\ai_listing\Command\AiBundleEbayTitleRefreshCommand
    arguments:
      - '@ai_listing.bundle_ebay_title_refresh'
    tags:
      - { name: drush.command }
