services:
  bb_ai_listing_sync.export_graph_builder:
    class: Drupal\bb_ai_listing_sync\Service\ListingSyncExportGraphBuilder
    arguments:
      - '@entity_type.manager'

  bb_ai_listing_sync.graph_fingerprint:
    class: Drupal\bb_ai_listing_sync\Service\ListingSyncGraphFingerprintService
    arguments:
      - '@entity_type.manager'
      - '@bb_ai_listing_sync.legacy_table_sync'

  bb_ai_listing_sync.command:
    class: Drupal\bb_ai_listing_sync\Command\BbAiListingSyncCommand
    arguments:
      - '@bb_ai_listing_sync.export_graph_builder'
      - '@bb_ai_listing_sync.graph_fingerprint'
      - '@entity_type.manager'
    tags:
      - { name: drush.command }
