services:
  bb_ebay_mirror.inventory_command:
    class: Drupal\bb_ebay_mirror\Command\EbayMirrorInventoryCommand
    arguments:
      - '@bb_ebay_mirror.inventory_sync_service'
      - '@entity_type.manager'
    tags:
      - { name: drush.command }

  bb_ebay_mirror.offer_command:
    class: Drupal\bb_ebay_mirror\Command\EbayMirrorOfferCommand
    arguments:
      - '@bb_ebay_mirror.offer_sync_service'
      - '@entity_type.manager'
    tags:
      - { name: drush.command }

  bb_ebay_mirror.audit_command:
    class: Drupal\bb_ebay_mirror\Command\EbayMirrorAuditCommand
    arguments:
      - '@bb_ebay_mirror.audit_service'
      - '@entity_type.manager'
    tags:
      - { name: drush.command }
