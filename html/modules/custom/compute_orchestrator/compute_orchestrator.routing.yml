compute_orchestrator.vllm_pool_admin:
  path: '/admin/compute-orchestrator/vllm-pool'
  defaults:
    _form: '\Drupal\compute_orchestrator\Form\VllmPoolAdminForm'
    _title: 'vLLM pool'
  requirements:
    _permission: 'administer compute orchestrator'

compute_orchestrator.settings:
  path: '/admin/config/system/compute-orchestrator'
  defaults:
    _form: '\Drupal\compute_orchestrator\Form\ComputeOrchestratorSettingsForm'
    _title: 'Compute Orchestrator settings'
  requirements:
    _permission: 'administer compute orchestrator'

compute_orchestrator.framesmith_transcription_start:
  path: '/api/framesmith/transcription/start'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\FramesmithTranscriptionController::start'
    _title: 'Framesmith transcription start'
  requirements:
    _permission: 'use framesmith transcription api'
  methods: [POST]

compute_orchestrator.framesmith_transcription_upload:
  path: '/api/framesmith/transcription/upload'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\FramesmithTranscriptionController::upload'
    _title: 'Framesmith transcription upload'
  requirements:
    _permission: 'use framesmith transcription api'
  methods: [POST]

compute_orchestrator.framesmith_transcription_status:
  path: '/api/framesmith/transcription/status'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\FramesmithTranscriptionController::status'
    _title: 'Framesmith transcription status'
  requirements:
    _permission: 'use framesmith transcription api'
  methods: [GET]

compute_orchestrator.framesmith_transcription_result:
  path: '/api/framesmith/transcription/result'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\FramesmithTranscriptionController::result'
    _title: 'Framesmith transcription result'
  requirements:
    _permission: 'use framesmith transcription api'
  methods: [GET]


compute_orchestrator.runtime_lease_acquire:
  path: '/api/compute-orchestrator/runtime-leases'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\RuntimeLeaseController::acquire'
    _title: 'Acquire compute runtime lease'
  requirements:
    _permission: 'use compute runtime leases'
  methods: [POST]

compute_orchestrator.runtime_lease_inspect:
  path: '/api/compute-orchestrator/runtime-leases/{lease_id}'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\RuntimeLeaseController::inspect'
    _title: 'Inspect compute runtime lease'
  requirements:
    _permission: 'use compute runtime leases'
  methods: [GET]

compute_orchestrator.runtime_lease_renew:
  path: '/api/compute-orchestrator/runtime-leases/{lease_id}/renew'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\RuntimeLeaseController::renew'
    _title: 'Renew compute runtime lease'
  requirements:
    _permission: 'use compute runtime leases'
  methods: [POST]

compute_orchestrator.runtime_lease_release:
  path: '/api/compute-orchestrator/runtime-leases/{lease_id}/release'
  defaults:
    _controller: '\Drupal\compute_orchestrator\Controller\RuntimeLeaseController::release'
    _title: 'Release compute runtime lease'
  requirements:
    _permission: 'use compute runtime leases'
  methods: [POST]

