services:
  compute_orchestrator.vast_credential_provider:
    class: Drupal\compute_orchestrator\Service\VastCredentialProvider
    arguments:
      - '@config.factory'

  plugin.manager.compute_orchestrator.workload_readiness_adapter:
    class: Drupal\compute_orchestrator\Plugin\WorkloadReadinessAdapterManager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'

  compute_orchestrator.ssh_probe_executor:
    class: Drupal\compute_orchestrator\Service\SshProbeExecutor
    arguments:
      - '@logger.factory'

  compute_orchestrator.ssh_key_path_resolver:
    class: Drupal\compute_orchestrator\Service\SshKeyPathResolver

  compute_orchestrator.vast_api_client:
    class: Drupal\compute_orchestrator\Service\VastApiClient
    arguments:
      - '@http_client'
      - '@logger.factory'
      - '@compute_orchestrator.vast_credential_provider'

  compute_orchestrator.vast_rest_client:
    class: Drupal\compute_orchestrator\Service\VastRestClient
    arguments:
      - '@compute_orchestrator.vast_api_client'
      - '@compute_orchestrator.bad_host_registry'
      - '@plugin.manager.compute_orchestrator.workload_readiness_adapter'
      - '@compute_orchestrator.ssh_probe_executor'
      - '@compute_orchestrator.ssh_key_path_resolver'
      - '@logger.factory'
      - '@state'

  compute_orchestrator.bad_host_registry:
    class: Drupal\compute_orchestrator\Service\BadHostRegistry
    arguments:
      - '@state'

  compute_orchestrator.vlm_client:
    class: Drupal\compute_orchestrator\Service\VlmClient
    arguments:
      - '@http_client'
      - '@file_system'
      - '@compute_orchestrator.vllm_pool_repository'
      - '@state'

  compute_orchestrator.vllm_workload_catalog:
    class: Drupal\compute_orchestrator\Service\VllmWorkloadCatalog

  compute_orchestrator.vast_instance_lifecycle_client:
    class: Drupal\compute_orchestrator\Service\VastInstanceLifecycleClient
    arguments:
      - '@compute_orchestrator.vast_api_client'

  compute_orchestrator.generic_vllm_runtime_manager:
    class: Drupal\compute_orchestrator\Service\GenericVllmRuntimeManager
    arguments:
      - '@compute_orchestrator.vast_rest_client'
      - '@compute_orchestrator.ssh_probe_executor'
      - '@compute_orchestrator.ssh_key_path_resolver'
      - '@config.factory'
      - '@logger.factory'

  compute_orchestrator.vllm_pool_repository:
    class: Drupal\compute_orchestrator\Service\VllmPoolRepository
    arguments:
      - '@state'


  compute_orchestrator.runtime_lease_response_mapper:
    class: Drupal\compute_orchestrator\Service\RuntimeLeaseResponseMapper

  compute_orchestrator.vllm_pool_manager:
    class: Drupal\compute_orchestrator\Service\VllmPoolManager
    arguments:
      - '@compute_orchestrator.vllm_pool_repository'
      - '@compute_orchestrator.vllm_workload_catalog'
      - '@compute_orchestrator.generic_vllm_runtime_manager'
      - '@compute_orchestrator.vast_instance_lifecycle_client'
      - '@compute_orchestrator.vast_rest_client'
      - '@state'
      - '@compute_orchestrator.bad_host_registry'
      - 3
      - 10
      - '@logger.factory'

  compute_orchestrator.framesmith_transcription_task_store:
    class: Drupal\compute_orchestrator\Service\FramesmithTranscriptionTaskStore
    arguments:
      - '@state'
      - '@uuid'
      - '@file_system'

  Drupal\compute_orchestrator\Service\FramesmithTranscriptionTaskStoreInterface: '@compute_orchestrator.framesmith_transcription_task_store'

  compute_orchestrator.framesmith_transcription_launcher:
    class: Drupal\compute_orchestrator\Service\FramesmithTranscriptionLauncher
    arguments:
      - '@compute_orchestrator.framesmith_transcription_task_store'
      - '@logger.factory'
      - '%app.root%'
      - '@file_system'

  Drupal\compute_orchestrator\Service\FramesmithTranscriptionLauncherInterface: '@compute_orchestrator.framesmith_transcription_launcher'

  compute_orchestrator.framesmith_direct_compute_runtime_client:
    class: Drupal\compute_orchestrator\Service\FramesmithDirectComputeRuntimeClient
    arguments:
      - '@compute_orchestrator.vllm_pool_manager'

  compute_orchestrator.framesmith_runtime_lease_manager: '@compute_orchestrator.framesmith_direct_compute_runtime_client'

  Drupal\compute_orchestrator\Service\FramesmithComputeRuntimeClientInterface: '@compute_orchestrator.framesmith_direct_compute_runtime_client'

  Drupal\compute_orchestrator\Service\FramesmithRuntimeLeaseManagerInterface: '@compute_orchestrator.framesmith_runtime_lease_manager'


  compute_orchestrator.framesmith_real_transcription_executor:
    class: Drupal\compute_orchestrator\Service\FramesmithWhisperHttpTranscriptionExecutor
    arguments:
      - '@http_client'
      - '@file_system'

  compute_orchestrator.framesmith_fake_transcription_executor:
    class: Drupal\compute_orchestrator\Service\FramesmithFakeTranscriptionExecutor
    arguments:
      - '@file_system'

  compute_orchestrator.framesmith_transcription_executor:
    class: Drupal\compute_orchestrator\Service\FramesmithSelectableTranscriptionExecutor
    arguments:
      - '@compute_orchestrator.framesmith_real_transcription_executor'
      - '@compute_orchestrator.framesmith_fake_transcription_executor'
      - '@state'

  Drupal\compute_orchestrator\Service\FramesmithTranscriptionExecutorInterface: '@compute_orchestrator.framesmith_transcription_executor'

  compute_orchestrator.framesmith_transcription_runner:
    class: Drupal\compute_orchestrator\Service\FramesmithTranscriptionRunner
    arguments:
      - '@compute_orchestrator.framesmith_transcription_task_store'
      - '@compute_orchestrator.framesmith_runtime_lease_manager'
      - '@compute_orchestrator.framesmith_transcription_executor'
