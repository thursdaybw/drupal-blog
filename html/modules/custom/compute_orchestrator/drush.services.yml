services:
  compute_orchestrator.vast_test_command:
    class: Drupal\compute_orchestrator\Command\VastTestCommand
    arguments:
      - '@compute_orchestrator.vast_rest_client'
    tags:
      - { name: drush.command }

  compute_orchestrator.bad_hosts_command:
    class: Drupal\compute_orchestrator\Command\BadHostsCommand
    arguments:
      - '@compute_orchestrator.bad_host_registry'
      - '@state'
    tags:
      - { name: drush.command }

  compute_orchestrator.known_good_hosts_command:
    class: Drupal\compute_orchestrator\Command\KnownGoodHostsCommand
    arguments:
      - '@state'
    tags:
      - { name: drush.command }

  compute_orchestrator.vllm_instance_pool_command:
    class: Drupal\compute_orchestrator\Command\VllmInstancePoolCommand
    arguments:
      - '@compute_orchestrator.vllm_pool_manager'
    tags:
      - { name: drush.command }

  compute_orchestrator.vllm_generic_provision_command:
    class: Drupal\compute_orchestrator\Command\VllmGenericProvisionCommand
    arguments:
      - '@compute_orchestrator.vllm_workload_catalog'
      - '@compute_orchestrator.generic_vllm_runtime_manager'
      - '@compute_orchestrator.vast_rest_client'
    tags:
      - { name: drush.command }

  compute_orchestrator.framesmith_transcription_command:
    class: Drupal\compute_orchestrator\Command\FramesmithTranscriptionCommand
    arguments:
      - '@service_container'
    tags:
      - { name: drush.command }
