services:
  drupal.ebay_connector.config_override:
    class: Drupal\ebay_connector\Config\EbayConnectorConfigOverride
    tags:
      - { name: config.factory.override, priority: 100 }

  drupal.ebay_connector.marketplace_publisher:
    class: Drupal\ebay_connector\Service\EbayMarketplacePublisher
    arguments:
      - '@drupal.ebay_infrastructure.sell_api'
      - '@drupal.ebay_connector.condition_mapper'
      - '@Drupal\listing_publishing\Contract\ListingImageUploaderInterface'
      - '@drupal.ebay_infrastructure.store_service'
      - '@?drupal.ebay_infrastructure.account_manager'
      - '@?bb_ebay_mirror.inventory_sync_service'
      - '@?bb_ebay_mirror.offer_sync_service'
      - '@logger.factory'

  drupal.ebay_connector.condition_mapper:
    class: Drupal\ebay_connector\Service\ConditionMapper
