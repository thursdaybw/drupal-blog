services:
  drupal.ebay_infrastructure.oauth_token:
    class: Drupal\ebay_infrastructure\Service\OAuthTokenService
    arguments:
      - '@http_client'
      - '@config.factory'

  drupal.ebay_infrastructure.account_manager:
    class: Drupal\ebay_infrastructure\Service\EbayAccountManager
    arguments:
      - '@entity_type.manager'
      - '@drupal.ebay_infrastructure.oauth_token'

  drupal.ebay_infrastructure.media_api:
    class: Drupal\ebay_infrastructure\Service\EbayMediaApiClient
    arguments:
      - '@http_client'
      - '@drupal.ebay_infrastructure.account_manager'

  drupal.ebay_infrastructure.media_image_uploader:
    class: Drupal\ebay_infrastructure\Service\EbayMediaImageUploader
    arguments:
      - '@drupal.ebay_infrastructure.media_api'

  drupal.ebay_infrastructure.sell_api:
    class: Drupal\ebay_infrastructure\Service\SellApiClient
    arguments:
      - '@http_client'
      - '@drupal.ebay_infrastructure.account_manager'

  drupal.ebay_infrastructure.fulfillment_orders:
    class: Drupal\ebay_infrastructure\Service\EbayFulfillmentOrdersClient
    arguments:
      - '@http_client'
      - '@drupal.ebay_infrastructure.account_manager'

  drupal.ebay_infrastructure.store_service:
    class: Drupal\ebay_infrastructure\Service\StoreService
    arguments:
      - '@drupal.ebay_infrastructure.sell_api'

  drupal.ebay_infrastructure.sku_removal:
    class: Drupal\ebay_infrastructure\Service\EbaySkuRemovalService
    arguments:
      - '@drupal.ebay_infrastructure.sell_api'
      - '@?drupal.ebay_infrastructure.account_manager'
      - '@?bb_ebay_mirror.inventory_sync_service'
      - '@?bb_ebay_mirror.offer_sync_service'

  drupal.ebay_infrastructure.marketplace_unpublisher:
    class: Drupal\ebay_infrastructure\Service\EbayMarketplaceUnpublisher
    arguments:
      - '@drupal.ebay_infrastructure.sku_removal'
    tags:
      - { name: listing_publishing.marketplace_unpublisher }
