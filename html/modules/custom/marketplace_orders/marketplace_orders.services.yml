services:
  Drupal\marketplace_orders\Contract\MarketplaceOrdersPortInterface:
    class: Drupal\marketplace_orders\Infrastructure\Ebay\EbayMarketplaceOrdersPort
    arguments:
      - '@drupal.ebay_infrastructure.fulfillment_orders'
      - '@Drupal\marketplace_orders\Infrastructure\Ebay\EbayOrderPayloadMapper'

  Drupal\marketplace_orders\Contract\MarketplaceOrderRepositoryInterface:
    class: Drupal\marketplace_orders\Infrastructure\DatabaseMarketplaceOrderRepository
    arguments:
      - '@database'
      - '@datetime.time'

  Drupal\marketplace_orders\Contract\MarketplaceOrderSyncStateRepositoryInterface:
    class: Drupal\marketplace_orders\Infrastructure\DatabaseMarketplaceOrderSyncStateRepository
    arguments:
      - '@database'
      - '@datetime.time'

  marketplace_orders.sync_service:
    arguments:
      - '@Drupal\marketplace_orders\Contract\MarketplaceOrdersPortInterface'
      - '@Drupal\marketplace_orders\Contract\MarketplaceOrderRepositoryInterface'
      - '@Drupal\marketplace_orders\Contract\MarketplaceOrderSyncStateRepositoryInterface'
    class: Drupal\marketplace_orders\Service\SyncMarketplaceOrdersSinceService

  Drupal\marketplace_orders\Service\SyncMarketplaceOrdersSinceService:
    alias: marketplace_orders.sync_service

  marketplace_orders.pick_pack_queue_query:
    arguments:
      - '@database'
    class: Drupal\marketplace_orders\Service\PickPackQueueQueryService

  Drupal\marketplace_orders\Service\PickPackQueueQueryService:
    alias: marketplace_orders.pick_pack_queue_query

  Drupal\marketplace_orders\Infrastructure\Ebay\EbayOrderPayloadMapper:
    arguments:
      - '@entity_type.manager'
