---
# One-time cutover playbook for production reverse proxy.

- name: Configure production reverse proxy cutover
  hosts: prod
  become: false
  gather_facts: false

  vars:
    prod_domain: www.bevansbench.com
    prod_upstream_host: 127.0.0.1
    prod_upstream_port: 18081
    prod_tls_email: bevan@bevansbench.com
    nginx_prod_site_filename: bb-platform-prod.conf

    # Optional: set this with -e to disable an old site symlink during cutover.
    # Example: -e old_prod_site_filename=www.bevansbench.com.conf
    old_prod_site_filename: ""

  tasks:
    - name: Run sudo preflight checks
      ansible.builtin.import_tasks: tasks/preflight_sudo.yml

    - name: Run production reverse proxy tasks
      ansible.builtin.import_tasks: tasks/reverse_proxy_prod.yml
