---
# Activate a release image for an environment (staging or prod):
# 1) verify artifact exists on the remote host
# 2) load that artifact into Docker on the remote host
# 3) copy environment compose file
# 4) run docker compose up -d
# 5) ensure environment reverse proxy/TLS are configured

- name: Activate release image on target environment
  hosts: "{{ deploy_env | default('staging') }}"
  become: false
  gather_facts: false

  vars:
    # Artifact workspace path on the remote host.
    release_workspace: /home/bevan/workspace/bb-platform-prod

    # Directory where deploy artifacts are uploaded.
    # Can be overridden from CLI with:
    # -e release_remote_dir=/some/path
    release_remote_dir: "{{ release_workspace }}/releases"

    # Name of the artifact file (for example: bb-platform-drupal-git-abc123.tar.gz).
    # Must be provided by caller.
    release_artifact_name: ""

    # Docker image reference expected after load (for example: bb-platform-drupal:git-abc123).
    # Must be provided by caller.
    release_image_ref: ""

    # Drush binary path relative to /var/www/html in the app container.
    # Keep this in one place so image layout changes are a single edit.
    app_drush_bin: ../vendor/bin/drush

    deploy_targets:
      staging:
        name: staging
        workspace: /home/bevan/workspace/bb-platform-staging
        compose_src: "{{ playbook_dir }}/../compose/shared/docker-compose.yml"
        compose_path: /home/bevan/workspace/bb-platform-staging/docker-compose.yml
        local_env_src: "{{ playbook_dir }}/../compose/staging/.env"
        env_path: /home/bevan/workspace/bb-platform-staging/.env
        env_example: ops/compose/staging/.env.example
        domain: bb-drupal-staging.bevansbench.com
        upstream_host: 127.0.0.1
        upstream_port: 18082
        app_port: 18082
        mysql_volume_name: bb-platform-staging_mysql_data
        tls_email: bevan@bevansbench.com
        nginx_site_filename: bb-drupal-staging.conf
        proxy_tasks: tasks/reverse_proxy_staging.yml
      prod:
        name: prod
        workspace: /home/bevan/workspace/bb-platform-prod
        compose_src: "{{ playbook_dir }}/../compose/shared/docker-compose.yml"
        compose_path: /home/bevan/workspace/bb-platform-prod/docker-compose.yml
        local_env_src: "{{ playbook_dir }}/../compose/prod/.env"
        env_path: /home/bevan/workspace/bb-platform-prod/.env
        env_example: ops/compose/prod/.env.example
        domain: www.bevansbench.com
        apex_domain: bevansbench.com
        upstream_host: 127.0.0.1
        upstream_port: 18081
        app_port: 18081
        mysql_volume_name: bb-platform-prod_mysql_data
        tls_email: bevan@bevansbench.com
        nginx_site_filename: bb-platform-prod.conf
        proxy_tasks: tasks/reverse_proxy_prod.yml

  tasks:
    - name: Resolve deploy environment
      ansible.builtin.set_fact:
        deploy_env_effective: "{{ deploy_env | default('staging') }}"

    - name: Validate deploy_env is supported
      ansible.builtin.assert:
        that:
          - deploy_env_effective in deploy_targets
        fail_msg: |
          Unsupported deploy_env '{{ deploy_env_effective }}'.

          Supported values:
          - staging
          - prod

    - name: Select target settings for current environment
      ansible.builtin.set_fact:
        deploy_target: "{{ deploy_targets[deploy_env_effective] }}"

    - name: Run sudo preflight checks
      ansible.builtin.import_tasks: tasks/preflight_sudo.yml

    - name: Validate required deploy variables are present
      ansible.builtin.assert:
        that:
          - release_artifact_name | length > 0
          - release_image_ref | length > 0
        fail_msg: |
          Missing deploy variables.

          Expected:
          - release_artifact_name
          - release_image_ref

          Example:
          ansible-playbook -i ops/ansible/inventory.ini ops/ansible/deploy_image.yml \
            -e deploy_env={{ deploy_env_effective }} \
            -e release_artifact_name=bb-platform-drupal-git-abc123.tar.gz \
            -e release_image_ref=bb-platform-drupal:git-abc123

    - name: Ensure remote release directory exists
      ansible.builtin.file:
        path: "{{ release_remote_dir }}"
        state: directory
        mode: "0755"

    - name: Check release artifact exists on remote host
      ansible.builtin.stat:
        path: "{{ release_remote_dir }}/{{ release_artifact_name }}"
      register: release_artifact_stat

    - name: Fail when release artifact is missing on remote host
      ansible.builtin.assert:
        that:
          - release_artifact_stat.stat.exists
        fail_msg: |
          Release artifact not found on remote host.

          Expected path:
          {{ release_remote_dir }}/{{ release_artifact_name }}

          Upload the artifact first, then rerun deploy_image.yml.

    - name: Load release image artifact into remote Docker
      ansible.builtin.command:
        cmd: "sudo -n docker load -i {{ release_remote_dir }}/{{ release_artifact_name }}"
      register: docker_load_result
      changed_when: true

    - name: Verify loaded image is addressable by expected tag
      ansible.builtin.command:
        cmd: "sudo -n docker image inspect {{ release_image_ref }}"
      changed_when: false

    - name: Write latest loaded image marker file
      ansible.builtin.copy:
        dest: "{{ release_workspace }}/latest-loaded-image.txt"
        mode: "0644"
        content: |
          {{ release_image_ref }}

    - name: Ensure environment workspace exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ deploy_target.workspace }}"
        - "{{ deploy_target.workspace }}/html"
        - "{{ deploy_target.workspace }}/html/sites"
        - "{{ deploy_target.workspace }}/html/sites/default"

    - name: Ensure environment bind-mount source directories exist with expected ownership
      ansible.builtin.command:
        cmd: >-
          sudo -n install -d -o {{ ansible_user }} -g {{ ansible_user }} -m 0755 {{ item }}
      loop:
        - "{{ deploy_target.workspace }}/html/sites/default/files"
        - "{{ deploy_target.workspace }}/content"
        - "{{ deploy_target.workspace }}/content/sync"

    - name: Ensure environment files directory exists
      ansible.builtin.file:
        path: "{{ deploy_target.workspace }}/html/sites/default/files"
        state: directory

    - name: Copy environment docker-compose file to remote workspace
      ansible.builtin.copy:
        src: "{{ deploy_target.compose_src }}"
        dest: "{{ deploy_target.compose_path }}"
        mode: "0644"

    - name: Check local environment .env exists on control machine
      ansible.builtin.stat:
        path: "{{ deploy_target.local_env_src }}"
      register: local_env_stat
      delegate_to: localhost
      run_once: true

    - name: Fail when local environment .env is missing
      ansible.builtin.assert:
        that:
          - local_env_stat.stat.exists
        fail_msg: |
          Missing local {{ deploy_target.name }} env file.

          Expected:
          {{ deploy_target.local_env_src }}

          Create it from:
          {{ deploy_target.env_example }}

    - name: Copy local environment .env to remote workspace
      ansible.builtin.copy:
        src: "{{ deploy_target.local_env_src }}"
        dest: "{{ deploy_target.env_path }}"
        mode: "0600"

    - name: Ensure environment .env exists on remote host
      ansible.builtin.stat:
        path: "{{ deploy_target.env_path }}"
      register: env_stat

    - name: Fail when environment .env is missing on remote host
      ansible.builtin.assert:
        that:
          - env_stat.stat.exists
        fail_msg: |
          Missing {{ deploy_target.name }} env file on remote host after copy.

          Expected:
          {{ deploy_target.env_path }}

    - name: Set APP_IMAGE in environment .env for this release
      ansible.builtin.lineinfile:
        path: "{{ deploy_target.env_path }}"
        regexp: '^APP_IMAGE='
        line: "APP_IMAGE={{ release_image_ref }}"
        create: true
        mode: "0600"

    - name: Set APP_PORT in environment .env
      ansible.builtin.lineinfile:
        path: "{{ deploy_target.env_path }}"
        regexp: '^APP_PORT='
        line: "APP_PORT={{ deploy_target.app_port }}"
        create: true
        mode: "0600"

    - name: Set MYSQL_VOLUME_NAME in environment .env
      ansible.builtin.lineinfile:
        path: "{{ deploy_target.env_path }}"
        regexp: '^MYSQL_VOLUME_NAME='
        line: "MYSQL_VOLUME_NAME={{ deploy_target.mysql_volume_name }}"
        create: true
        mode: "0600"

    - name: Set DRUSH_OPTIONS_URI in environment .env
      ansible.builtin.lineinfile:
        path: "{{ deploy_target.env_path }}"
        regexp: '^DRUSH_OPTIONS_URI='
        line: "DRUSH_OPTIONS_URI=https://{{ deploy_target.domain }}"
        create: true
        mode: "0600"

    - name: Read environment .env content
      ansible.builtin.slurp:
        path: "{{ deploy_target.env_path }}"
      register: env_content

    - name: Assert required runtime variables exist in environment .env
      ansible.builtin.assert:
        that:
          - "(env_content.content | b64decode) is regex('(?m)^APP_PORT=.+$')"
          - "(env_content.content | b64decode) is regex('(?m)^MYSQL_VOLUME_NAME=.+$')"
          - "(env_content.content | b64decode) is regex('(?m)^MYSQL_ROOT_PASSWORD=.+$')"
          - "(env_content.content | b64decode) is regex('(?m)^MYSQL_USER=.+$')"
          - "(env_content.content | b64decode) is regex('(?m)^MYSQL_PASSWORD=.+$')"
          - "(env_content.content | b64decode) is regex('(?m)^MYSQL_DATABASE=.+$')"
        fail_msg: |
          {{ deploy_target.name | upper }} .env is present but missing required runtime values.

          Required non-empty keys:
          - APP_PORT
          - MYSQL_VOLUME_NAME
          - MYSQL_ROOT_PASSWORD
          - MYSQL_USER
          - MYSQL_PASSWORD
          - MYSQL_DATABASE

          File:
          {{ deploy_target.env_path }}

    - name: Validate environment compose configuration
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          config -q
      changed_when: false

    - name: Start environment services with docker compose
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          up -d
      register: compose_up_result
      changed_when: true

    - name: Ensure environment public files directory is writable by web user
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          exec -T appserver
          sh -lc 'mkdir -p /var/www/html/sites/default/files &&
                  chown -R www-data:www-data /var/www/html/sites/default/files &&
                  find /var/www/html/sites/default/files -type d -exec chmod 2775 {} + &&
                  find /var/www/html/sites/default/files -type f -exec chmod 0664 {} +'
      changed_when: true

    - name: Check Drupal bootstrap state in environment app container
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          exec -T appserver
          sh -lc 'cd /var/www/html && {{ app_drush_bin }} status --fields=bootstrap --format=list'
      register: drush_bootstrap
      changed_when: false
      failed_when: false

    - name: Import config on environment when Drupal is bootstrapped
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          exec -T appserver
          sh -lc 'cd /var/www/html && {{ app_drush_bin }} cim -y'
      register: drush_cim
      changed_when: "'No changes to import.' not in (drush_cim.stdout | default(''))"
      when:
        - drush_bootstrap.rc == 0
        - "'Successful' in (drush_bootstrap.stdout | default(''))"

    - name: Rebuild cache on environment when config import runs
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ deploy_target.compose_path }}
          --env-file {{ deploy_target.env_path }}
          exec -T appserver
          sh -lc 'cd /var/www/html && {{ app_drush_bin }} cr'
      changed_when: true
      when:
        - drush_bootstrap.rc == 0
        - "'Successful' in (drush_bootstrap.stdout | default(''))"

    - name: Note config import was skipped because Drupal is not bootstrapped
      ansible.builtin.debug:
        msg: >-
          Skipping drush cim/cr on {{ deploy_target.name }} because Drupal bootstrap is not ready yet
          (likely empty database on first boot).
      when:
        - drush_bootstrap.rc != 0 or ('Successful' not in (drush_bootstrap.stdout | default('')))

    - name: Map reverse proxy variables for environment task files
      ansible.builtin.set_fact:
        staging_domain: "{{ deploy_target.domain }}"
        staging_upstream_host: "{{ deploy_target.upstream_host }}"
        staging_upstream_port: "{{ deploy_target.upstream_port }}"
        staging_tls_email: "{{ deploy_target.tls_email }}"
        nginx_staging_site_filename: "{{ deploy_target.nginx_site_filename }}"
        prod_domain: "{{ deploy_target.domain }}"
        prod_apex_domain: "{{ deploy_target.apex_domain | default('') }}"
        prod_upstream_host: "{{ deploy_target.upstream_host }}"
        prod_upstream_port: "{{ deploy_target.upstream_port }}"
        prod_tls_email: "{{ deploy_target.tls_email }}"
        nginx_prod_site_filename: "{{ deploy_target.nginx_site_filename }}"

    - name: Run environment reverse proxy tasks
      ansible.builtin.include_tasks: "{{ deploy_target.proxy_tasks }}"

    - name: Output docker load summary
      ansible.builtin.debug:
        msg:
          - "Environment: {{ deploy_target.name }}"
          - "Loaded image: {{ release_image_ref }}"
          - "Artifact: {{ release_remote_dir }}/{{ release_artifact_name }}"
          - "Docker load output: {{ docker_load_result.stdout | default('') }}"
          - "Compose file: {{ deploy_target.compose_path }}"
          - "Compose up output: {{ compose_up_result.stdout | default('') }}"
