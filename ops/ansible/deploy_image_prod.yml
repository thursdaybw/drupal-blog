---
# Activate a release image for production:
# 1) verify artifact exists on the remote host
# 2) load that artifact into Docker on the remote host
# 3) copy production compose file
# 4) run docker compose up -d for production

- name: Activate release image on production target
  hosts: prod
  become: false
  gather_facts: false

  vars:
    release_workspace: /home/bevan/workspace/bb-platform-prod
    local_prod_env_src: "{{ playbook_dir }}/../compose/prod/.env"
    prod_env_path: "{{ release_workspace }}/.env"
    prod_compose_path: "{{ release_workspace }}/docker-compose.yml"

    release_remote_dir: "{{ release_workspace }}/releases"
    release_artifact_name: ""
    release_image_ref: ""

  tasks:
    - name: Run sudo preflight checks
      ansible.builtin.import_tasks: tasks/preflight_sudo.yml

    - name: Validate required deploy variables are present
      ansible.builtin.assert:
        that:
          - release_artifact_name | length > 0
          - release_image_ref | length > 0
        fail_msg: |
          Missing deploy variables.

          Expected:
          - release_artifact_name
          - release_image_ref

          Example:
          ansible-playbook -i ops/ansible/inventory.ini ops/ansible/deploy_image_prod.yml \
            -e release_artifact_name=bb-platform-drupal-git-abc123.tar.gz \
            -e release_image_ref=bb-platform-drupal:git-abc123

    - name: Ensure remote release directory exists
      ansible.builtin.file:
        path: "{{ release_remote_dir }}"
        state: directory
        mode: "0755"

    - name: Check release artifact exists on remote host
      ansible.builtin.stat:
        path: "{{ release_remote_dir }}/{{ release_artifact_name }}"
      register: release_artifact_stat

    - name: Fail when release artifact is missing on remote host
      ansible.builtin.assert:
        that:
          - release_artifact_stat.stat.exists
        fail_msg: |
          Release artifact not found on remote host.

          Expected path:
          {{ release_remote_dir }}/{{ release_artifact_name }}

          Upload the artifact first, then rerun deploy_image_prod.yml.

    - name: Load release image artifact into remote Docker
      ansible.builtin.command:
        cmd: "sudo -n docker load -i {{ release_remote_dir }}/{{ release_artifact_name }}"
      register: docker_load_result
      changed_when: true

    - name: Verify loaded image is addressable by expected tag
      ansible.builtin.command:
        cmd: "sudo -n docker image inspect {{ release_image_ref }}"
      changed_when: false

    - name: Write latest loaded image marker file
      ansible.builtin.copy:
        dest: "{{ release_workspace }}/latest-loaded-image.txt"
        mode: "0644"
        content: |
          {{ release_image_ref }}

    - name: Ensure production workspace exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ release_workspace }}"
        - "{{ release_workspace }}/html"
        - "{{ release_workspace }}/html/sites"
        - "{{ release_workspace }}/html/sites/default"
        - "{{ release_workspace }}/html/sites/default/files"

    - name: Copy production docker-compose file to remote workspace
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../compose/prod/docker-compose.yml"
        dest: "{{ prod_compose_path }}"
        mode: "0644"

    - name: Check local prod .env exists on control machine
      ansible.builtin.stat:
        path: "{{ local_prod_env_src }}"
      register: local_prod_env_stat
      delegate_to: localhost
      run_once: true

    - name: Fail when local prod .env is missing
      ansible.builtin.assert:
        that:
          - local_prod_env_stat.stat.exists
        fail_msg: |
          Missing local prod env file.

          Expected:
          {{ local_prod_env_src }}

          Create it from:
          ops/compose/prod/.env.example

    - name: Copy local prod .env to remote workspace
      ansible.builtin.copy:
        src: "{{ local_prod_env_src }}"
        dest: "{{ prod_env_path }}"
        mode: "0600"

    - name: Ensure prod .env exists on remote host
      ansible.builtin.stat:
        path: "{{ prod_env_path }}"
      register: prod_env_stat

    - name: Fail when prod .env is missing on remote host
      ansible.builtin.assert:
        that:
          - prod_env_stat.stat.exists
        fail_msg: |
          Missing prod env file on remote host after copy.

          Expected:
          {{ prod_env_path }}

    - name: Set APP_IMAGE in prod .env for this release
      ansible.builtin.lineinfile:
        path: "{{ prod_env_path }}"
        regexp: '^APP_IMAGE='
        line: "APP_IMAGE={{ release_image_ref }}"
        create: true
        mode: "0600"

    - name: Read prod .env content
      ansible.builtin.slurp:
        path: "{{ prod_env_path }}"
      register: prod_env_content

    - name: Assert required MySQL variables exist in prod .env
      ansible.builtin.assert:
        that:
          - "(prod_env_content.content | b64decode) is regex('(?m)^MYSQL_ROOT_PASSWORD=.+$')"
          - "(prod_env_content.content | b64decode) is regex('(?m)^MYSQL_USER=.+$')"
          - "(prod_env_content.content | b64decode) is regex('(?m)^MYSQL_PASSWORD=.+$')"
          - "(prod_env_content.content | b64decode) is regex('(?m)^MYSQL_DATABASE=.+$')"
        fail_msg: |
          Prod .env is present but missing required MySQL values.

          Required non-empty keys:
          - MYSQL_ROOT_PASSWORD
          - MYSQL_USER
          - MYSQL_PASSWORD
          - MYSQL_DATABASE

          File:
          {{ prod_env_path }}

    - name: Validate production compose configuration
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ prod_compose_path }}
          --env-file {{ prod_env_path }}
          config -q
      changed_when: false

    - name: Start production services with docker compose
      ansible.builtin.command:
        cmd: >-
          sudo -n docker compose
          -f {{ prod_compose_path }}
          --env-file {{ prod_env_path }}
          up -d
      register: compose_up_result
      changed_when: true

    - name: Output docker load summary
      ansible.builtin.debug:
        msg:
          - "Loaded image: {{ release_image_ref }}"
          - "Artifact: {{ release_remote_dir }}/{{ release_artifact_name }}"
          - "Docker load output: {{ docker_load_result.stdout | default('') }}"
          - "Compose file: {{ prod_compose_path }}"
          - "Compose up output: {{ compose_up_result.stdout | default('') }}"
