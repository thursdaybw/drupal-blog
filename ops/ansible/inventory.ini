# Ansible inventory = list of target hosts, grouped by purpose.
# Group names (`prod`, `staging`) are just labels we use when running playbooks.
# They are not SSH keys and not DNS records.
#
# Right now both groups point to the same host ssh alias (`bb-drupal-prod`) while we
# bootstrap staging on the same VPS.
# Later, if staging moves to a different server, change only the `staging` host.
[prod]
bb-drupal-prod

[staging]
bb-drupal-prod
