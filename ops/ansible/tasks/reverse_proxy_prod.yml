---
# Configure nginx reverse proxy for production domain.
# This play is intended for cutover, not for every deploy.

- name: Write production nginx site config
  ansible.builtin.command:
    cmd: sudo -n tee /etc/nginx/sites-available/{{ nginx_prod_site_filename }}
    stdin: |
      server {
        listen 80;
        server_name {{ prod_domain }};

        location / {
          proxy_pass http://{{ prod_upstream_host }}:{{ prod_upstream_port }};
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
  changed_when: true

- name: Enable production nginx site symlink
  ansible.builtin.command:
    cmd: >-
      sudo -n ln -sfn
      /etc/nginx/sites-available/{{ nginx_prod_site_filename }}
      /etc/nginx/sites-enabled/{{ nginx_prod_site_filename }}
  changed_when: true

- name: Optionally disable old production nginx site symlink
  ansible.builtin.command:
    cmd: sudo -n rm -f /etc/nginx/sites-enabled/{{ old_prod_site_filename }}
  when: old_prod_site_filename | length > 0
  changed_when: true

- name: Validate nginx config
  ansible.builtin.command:
    cmd: sudo -n /usr/sbin/nginx -t
  changed_when: false

- name: Reload nginx
  ansible.builtin.command:
    cmd: sudo -n /usr/bin/systemctl reload nginx
  changed_when: true

- name: Validate production TLS email is set
  ansible.builtin.assert:
    that:
      - prod_tls_email | length > 3
      - "'@' in prod_tls_email"
    fail_msg: |
      prod_tls_email is missing or invalid.

- name: Request or renew production TLS certificate via certbot nginx plugin
  ansible.builtin.command:
    cmd: >-
      sudo -n certbot --nginx
      --non-interactive
      --agree-tos
      --keep-until-expiring
      --redirect
      --email {{ prod_tls_email }}
      -d {{ prod_domain }}
  register: certbot_result
  changed_when: >-
    ('successfully received certificate' in (certbot_result.stdout | lower))
    or ('congratulations' in (certbot_result.stdout | lower))
    or ('renewing an existing certificate' in (certbot_result.stdout | lower))

- name: Validate nginx config after TLS automation
  ansible.builtin.command:
    cmd: sudo -n /usr/sbin/nginx -t
  changed_when: false

- name: Reload nginx after TLS automation
  ansible.builtin.command:
    cmd: sudo -n /usr/bin/systemctl reload nginx
  changed_when: true
