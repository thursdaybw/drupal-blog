---
# Configure nginx reverse proxy for staging domain.
#
# This writes an nginx vhost in /etc/nginx/sites-available,
# symlinks it into /etc/nginx/sites-enabled,
# validates nginx config, then reloads nginx.
#
# Requires passwordless sudo for:
# - tee
# - ln
# - rm
# - nginx -t
# - systemctl reload nginx

- name: Write staging nginx site config
  ansible.builtin.command:
    cmd: sudo -n tee /etc/nginx/sites-available/{{ nginx_staging_site_filename }}
    stdin: |
      server {
        listen 80;
        server_name {{ staging_domain }};

        location / {
          proxy_pass http://{{ staging_upstream_host }}:{{ staging_upstream_port }};
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
  changed_when: true

- name: Enable staging nginx site symlink
  ansible.builtin.command:
    cmd: >-
      sudo -n ln -sfn
      /etc/nginx/sites-available/{{ nginx_staging_site_filename }}
      /etc/nginx/sites-enabled/{{ nginx_staging_site_filename }}
  changed_when: true

- name: Validate nginx config
  ansible.builtin.command:
    cmd: sudo -n /usr/sbin/nginx -t
  register: nginx_test
  changed_when: false

- name: Reload nginx
  ansible.builtin.command:
    cmd: sudo -n /usr/bin/systemctl reload nginx
  changed_when: true
