services:
  appserver:
    # Set APP_IMAGE in staging .env during activation.
    # Example: APP_IMAGE=bb-platform-drupal:git-<sha>
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18082:80"
    volumes:
      # Persist Drupal files across container/image updates.
      - ./html/sites/default/files:/var/www/html/sites/default/files
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  # Dedicated fresh staging database volume.
  mysql_data:
    name: bb-platform-staging_mysql_data
